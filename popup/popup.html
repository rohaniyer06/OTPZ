<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <title>OTPZ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&family=Outfit:wght@400;500;600&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="popup.css" />
</head>

<body>
  <div id="app">
    <header>
      <div class="brand">
        <div class="logo">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="3" y="11" width="18" height="11" rx="3" stroke="url(#lockGrad)" stroke-width="2" />
            <path d="M7 11V7a5 5 0 0 1 10 0v4" stroke="url(#lockGrad)" stroke-width="2" stroke-linecap="round" />
            <circle cx="12" cy="16.5" r="1.5" fill="url(#lockGrad)" />
            <defs>
              <linearGradient id="lockGrad" x1="3" y1="3" x2="21" y2="22" gradientUnits="userSpaceOnUse">
                <stop stop-color="#7c3aed" />
                <stop offset="1" stop-color="#4f46e5" />
              </linearGradient>
            </defs>
          </svg>
        </div>
        <div class="brand-text">
          <h1>OTPZ</h1>
          <span class="tagline">Smart OTP Manager</span>
        </div>
      </div>
      <button id="refresh" title="Refresh OTPs" aria-label="Refresh OTPs">
        <span class="refresh-icon">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
            stroke-linecap="round" stroke-linejoin="round">
            <polyline points="23 4 23 10 17 10" />
            <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10" />
          </svg>
        </span>
        <span class="refresh-countdown" hidden></span>
      </button>
    </header>

    <main>
      <div id="loading" class="state-view" hidden>
        <div class="spinner"></div>
        <p class="loading-text">Fetching OTPs…</p>
      </div>

      <div id="error" class="state-view error-view" hidden></div>

      <ul id="list" hidden></ul>

      <div id="empty" class="state-view empty-view" hidden>
        <p class="empty-title">No recent OTPs found</p>
        <span class="empty-hint">OTPs from the last 10 minutes will appear here automatically</span>
      </div>
    </main>
  </div>
  <script type="module" src="popup.js"></script>
</body>

</html>
